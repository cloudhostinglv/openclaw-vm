# autoinstall-snippet.yaml — drop-in for the client's Ubuntu 24.04 autoinstall.
#
# Brings up the pre-baked OpenClaw stack (agent + setup panel + Caddy/TLS) for ONE
# client on first boot. This snippet does NOT run docker in-target; it only prepares the
# checkout, the compose-level secret, and a first-boot systemd oneshot. The actual
# `docker compose up` + applier install happens in firstboot.sh on the first real boot
# (where networking + the docker daemon are live).
#
# Placeholders use the existing {placeholder} templating; the provisioner substitutes:
#   {panel_password}      -> the panel login password (REQUIRED; the panel fails closed)
# NOTE: the provider/avots key, the messaging bot token and the owner id are NOT injected
# here. The client enters them in the panel, which writes them into the agent's data-dir
# config (openclaw.json + .env) and triggers the applier. Autoinstall only sets
# PANEL_PASSWORD; PANEL_DOMAIN is left blank so firstboot.sh auto-derives
#   vps-<3rd octet>-<4th octet>.cloudhosting.lv from the VM's primary IPv4.
# The gateway token is auto-generated by firstboot.sh into ./data/.env.
#
# NOTE on quoting: each late-command is a single-line shell string (printf with \n) so
# YAML never folds a multi-line heredoc body and corrupts the rendered .env / unit.

autoinstall:
  version: 1

  packages:
    - git
    - docker.io
    - docker-compose-v2
    - ca-certificates

  late-commands:
    # All commands run inside the installed system via `curtin in-target`. NO docker here
    # — the daemon/network aren't guaranteed during install. firstboot.sh does it.

    # 1. Toolchain present even if `packages:` above was overridden.
    - ["curtin", "in-target", "--", "bash", "-c", "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git docker.io docker-compose-v2 ca-certificates"]

    # 2. Clone the appliance repo to /opt/openclaw-vm (image pinned inside docker-compose.yml).
    - ["curtin", "in-target", "--", "bash", "-c", "test -d /opt/openclaw-vm || git clone --depth 1 https://github.com/cloudhostinglv/openclaw-vm.git /opt/openclaw-vm"]

    # 3. Write the compose-level .env. ONLY the panel password + domain. The provider key,
    #    bot token and owner id are NOT here — the client enters them in the panel, which
    #    writes them into the agent's data-dir config and triggers the applier.
    #    PANEL_DOMAIN blank => firstboot derives it from the primary IPv4.
    - ["curtin", "in-target", "--", "bash", "-c", "umask 077 && printf 'PANEL_PASSWORD=%s\\nPANEL_DOMAIN=\\n' '{panel_password}' > /opt/openclaw-vm/.env"]
    - ["curtin", "in-target", "--", "chmod", "0600", "/opt/openclaw-vm/.env"]

    # 4. Make firstboot.sh executable, install the shipped first-boot oneshot unit, enable it.
    - ["curtin", "in-target", "--", "chmod", "0755", "/opt/openclaw-vm/firstboot.sh"]
    - ["curtin", "in-target", "--", "cp", "/opt/openclaw-vm/openclaw-firstboot.service", "/etc/systemd/system/openclaw-firstboot.service"]
    - ["curtin", "in-target", "--", "systemctl", "enable", "openclaw-firstboot.service"]
